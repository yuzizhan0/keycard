<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" role="img" aria-label="Keycard">
  <title>Keycard</title>
  <defs>
    <linearGradient id="kc-card" x1="3" y1="2" x2="21" y2="22" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a3a6e"/>
      <stop offset="1" stop-color="#5c9eff"/>
    </linearGradient>
    <linearGradient id="kc-chip" x1="6.8" y1="6.8" x2="16.4" y2="17" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9ec5ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5c9eff" stop-opacity="0.75"/>
    </linearGradient>
  </defs>
  <!-- Card body -->
  <path
    d="M5.9 3.2h12.2a2.8 2.8 0 012.8 2.8v12a2.8 2.8 0 01-2.8 2.8H5.9A2.8 2.8 0 013.1 18V6a2.8 2.8 0 012.8-2.8z"
    fill="url(#kc-card)"
    stroke="#8eb8ff"
    stroke-width="1.2"
    stroke-linejoin="round"
  />
  <!-- Inner rim -->
  <path
    d="M6.8 4.8h10.4a1.6 1.6 0 011.6 1.6v11.2a1.6 1.6 0 01-1.6 1.6H6.8a1.6 1.6 0 01-1.6-1.6V6.4a1.6 1.6 0 011.6-1.6z"
    stroke="#ffffff"
    stroke-opacity="0.08"
    stroke-width="0.55"
  />
  <!-- EMV-style chip -->
  <rect
    x="6.9"
    y="6.9"
    width="9.6"
    height="10.2"
    rx="1.2"
    fill="url(#kc-chip)"
    stroke="#d4e6ff"
    stroke-opacity="0.55"
    stroke-width="0.9"
  />
  <path
    d="M8.45 9.05h5.9M8.45 11.2h5.9M8.45 13.35h4.7"
    stroke="#f0f6ff"
    stroke-opacity="0.5"
    stroke-width="0.48"
    stroke-linecap="round"
  />
  <!-- Key hole + bit -->
  <circle cx="16.3" cy="18.4" r="1.3" stroke="#f0f6ff" stroke-width="1.1"/>
  <path
    d="M15 18.4h-3.3M11.7 18.4v1.7"
    stroke="#f0f6ff"
    stroke-width="1.1"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
